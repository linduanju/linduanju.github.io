<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星河影视 - 首页</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:#070b10;color:#fff;
    }
    .app{max-width:1180px;margin:auto;padding:24px}
    header{display:flex;align-items:center;gap:28px;margin-bottom:22px}
    .logo{font-size:26px;font-weight:800;color:#f6c46c}
    nav{display:flex;gap:24px;color:#aeb6c2}
    nav span:first-child{color:#f6c46c;font-weight:700;border-bottom:3px solid #f6c46c;padding-bottom:8px}
    .search{margin-left:auto;background:#161c24;border-radius:28px;padding:12px 22px;color:#788392}
    .hero{
      height:470px;border-radius:24px;overflow:hidden;position:relative;
      background:linear-gradient(90deg,rgba(0,0,0,.85),rgba(0,0,0,.25)),url("https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1600&auto=format&fit=crop");
      background-size:cover;background-position:center;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      padding:70px;
    }
    .hero h1{font-size:58px;line-height:1.05;color:#f8d99b;margin-bottom:18px}
    .tag{display:inline-block;border:1px solid #d7ad65;border-radius:8px;padding:8px 18px;color:#f8d99b;margin-bottom:22px}
    .hero p{font-size:22px;color:#eee;margin-bottom:28px}
    .btn{display:inline-block;background:#f6c46c;color:#15100a;padding:14px 28px;border-radius:999px;font-weight:800}
    .quick{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:20px 0}
    .quick div{background:#121820;border-radius:18px;padding:22px;text-align:center;color:#f6c46c;font-size:20px}
    section{margin-top:28px}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .section-title h2{font-size:26px}
    .section-title span{color:#8993a0}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
    .card{background:#10161e;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .poster{height:300px;background-size:cover;background-position:center;position:relative}
    .rank{position:absolute;top:10px;left:10px;background:#ef6b4a;padding:8px 12px;border-radius:10px;font-weight:800}
    .vip{position:absolute;top:10px;right:10px;background:#f6c46c;color:#21170a;padding:5px 9px;border-radius:8px;font-weight:700}
    .info{padding:14px}
    .info h3{font-size:20px;margin-bottom:7px}
    .info p{color:#8893a1;margin-bottom:8px}
    .score{color:#f6c46c;font-weight:800}
    .small-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
    .small-card{height:150px;border-radius:16px;overflow:hidden;background:#151b23;position:relative;padding:12px;display:flex;align-items:flex-end;background-size:cover;background-position:center}
    .small-card::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.85))}
    .small-card b{position:relative;z-index:1}
    footer{position:sticky;bottom:0;margin-top:32px;background:rgba(10,14,19,.9);backdrop-filter:blur(16px);border-radius:24px;padding:18px;display:flex;justify-content:space-around;color:#8f98a5}
    footer span:first-child{color:#f6c46c;font-weight:800}
    @media(max-width:800px){
      .app{padding:14px}
      nav{display:none}.search{display:none}
      .hero{height:520px;padding:36px;background-position:center}
      .hero h1{font-size:42px}
      .grid{grid-template-columns:repeat(2,1fr)}
      .small-grid{grid-template-columns:repeat(2,1fr)}
      .quick{grid-template-columns:repeat(5,1fr)}
      .quick div{font-size:14px;padding:14px 6px}
      .poster{height:230px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">▶ 星河影视</div>
      <nav><span>首页</span><span>电视剧</span><span>电影</span><span>综艺</span><span>动漫</span><span>纪录片</span></nav>
      <div class="search">搜索影片、演员</div>
    </header>

    <div class="hero">
      <h1>21世纪<br>大君夫人</h1>
      <div class="tag">1-12集全集终</div>
      <p>一段跨越身份的爱情故事</p>
      <span class="btn">▶ 立即播放</span>
    </div>

    <div class="quick">
      <div>👑<br>排行榜</div><div>🔥<br>热播</div><div>🏆<br>口碑榜</div><div>📅<br>新剧日历</div><div>⭐<br>片单</div>
    </div>

    <section>
      <div class="section-title"><h2>正在热播 🔥</h2><span>更多 ›</span></div>
      <div class="grid">
        <div class="card">
          <div class="poster" style="background-image:url('https://images.unsplash.com/photo-1521856729154-7118f7181af9?q=80&w=900&auto=format&fit=crop')"><div class="rank">1</div><div class="vip">VIP</div></div>
          <div class="info"><h3>佳偶天成</h3><p>古装 · 爱情 · 奇幻</p><div class="score">★ 9.1</div></div>
        </div>
        <div class="card">
          <div class="poster" style="background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=900&auto=format&fit=crop')"><div class="rank">2</div><div class="vip">VIP</div></div>
          <div class="info"><h3>有港回信</h3><p>剧情 · 爱情</p><div class="score">★ 8.8</div></div>
        </div>
        <div class="card">
          <div class="poster" style="background-image:url('https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?q=80&w=900&auto=format&fit=crop')"><div class="rank">3</div><div class="vip">VIP</div></div>
          <div class="info"><h3>21世纪大君夫人</h3><p>喜剧 · 爱情 · 韩剧</p><div class="score">★ 8.1</div></div>
        </div>
        <div class="card">
          <div class="poster" style="background-image:url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=900&auto=format&fit=crop')"><div class="vip">VIP</div></div>
          <div class="info"><h3>蜜语纪</h3><p>剧情 · 爱情</p><div class="score">★ 8.5</div></div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-title"><h2>今日推荐</h2><span>更多 ›</span></div>
      <div class="small-grid">
        <div class="small-card" style="background-image:url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=600&auto=format&fit=crop')"><b>深情诱引</b></div>
        <div class="small-card" style="background-image:url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600&auto=format&fit=crop')"><b>长风渡</b></div>
        <div class="small-card" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=600&auto=format&fit=crop')"><b>黑色真相</b></div>
        <div class="small-card" style="background-image:url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac?q=80&w=600&auto=format&fit=crop')"><b>小城故事多</b></div>
        <div class="small-card" style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=600&auto=format&fit=crop')"><b>想见你</b></div>
      </div>
    </section>

    <footer>
      <span>首页</span><span>发现</span><span>会员</span><span>消息</span><span>我的</span>
    </footer>
  </div>
</body>
</html>
